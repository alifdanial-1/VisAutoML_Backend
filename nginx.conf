http {
    server {
        listen 80;

        location / {
            proxy_pass http://127.0.0.1:8000;
        }

        location ~ ^/dashboard-proxy/(?<model>[^/]+)/ {
            # Forward to the correct port using internal redirect
            # NOTE: For production, use Lua or a custom middleware reverse proxy.
            proxy_pass http://127.0.0.1:8501;  # placeholder; dynamic mapping must happen in app
        }
    }
}
